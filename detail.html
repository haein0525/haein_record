<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Detail — Haein Lee</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon_img.png" />
</head>
<body class="detail-page">
  <nav class="detail-nav">
    <a href="index.html#works" class="detail-back">← Works</a>
    <a href="index.html#hero" class="brand detail-brand" aria-label="home">
      <img src="assets/logo-img.png" alt="Haein Lee logo" />
    </a>
  </nav>


    <!-- 상세페이지 추가 -->

  <main id="detailRoot" class="detail-root">
    <section class="detail-hero">
      <p id="detailCategory" class="detail-category"></p>
      <h1 id="detailTitle"></h1>
      <p id="detailSubTitle" class="detail-subtitle"></p>
      <div id="detailTools" class="detail-tools"></div>
    </section>

    <section class="detail-visual">
      <img id="detailImage" src="" alt="프로젝트 상세 이미지" />
    </section>

    <section class="detail-overview" id="detailOverview"></section>

    <section class="detail-content" id="detailContent"></section>

    <section class="detail-result">
      <div>
        <span>Contribution</span>
        <strong id="detailContribution"></strong>
      </div>
      <p id="detailRole"></p>
    </section>

    <div class="detail-actions">
      <a href="index.html#works">목록으로 돌아가기</a>
    </div>
  </main>

  <script src="works-data.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id') || 'workation';
    const works = window.WORKS || [];
    const item = works.find(work => work.id === id) || works[0];

    if (!item) {
      document.getElementById('detailRoot').innerHTML = '<section class="detail-empty"><h1>프로젝트를 찾을 수 없습니다.</h1><a href="index.html#works">목록으로 돌아가기</a></section>';
    } else {
      document.title = `${item.title} — Haein Lee`;
      document.getElementById('detailCategory').textContent = item.category;
      document.getElementById('detailTitle').textContent = item.title;
      document.getElementById('detailSubTitle').textContent = item.subTitle || item.desc;
      document.getElementById('detailImage').src = item.detailImage || item.image;
      document.getElementById('detailImage').alt = item.title;
      document.getElementById('detailContribution').textContent = `${item.contribution}%`;
      document.getElementById('detailRole').textContent = item.role;

      document.getElementById('detailTools').innerHTML = (item.tools || [])
        .map(tool => `<span>${tool}</span>`)
        .join('');

      document.getElementById('detailOverview').innerHTML = (item.overview || [])
        .map(([label, value]) => `<article><small>${label}</small><strong>${value}</strong></article>`)
        .join('');

      document.getElementById('detailContent').innerHTML = (item.sections || [])
        .map(section => `<article><h2>${section.heading}</h2><p>${section.text}</p></article>`)
        .join('');
    }
  </script>
</body>
</html>
